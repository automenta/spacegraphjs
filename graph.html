<!DOCTYPE html>
<html>
<head>
    <title>Language Model Mind Map</title>
    <script src="https://unpkg.com/jquery/dist/jquery.min.js"></script>
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="cytoscape-dom-node.js"></script>
    <link rel="stylesheet" href="graph.css"/>
    <script src="lm.js"></script>
    <script src="transform.js"></script>
    <script src="graph.js"></script>
</head>
<body>
<script>

</script>
<div id="cy"></div>

<div id="editor-popup" style="display: none;">
    <textarea id="editor" rows="10" cols="36"></textarea>
    <br>
    <button id="save-button">Save</button>
    <button id="cancel-button">Cancel</button>
</div>

<div id="transformer-ui" style="display: none;"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {

        const createInteractiveList = () => {
            const container = $('<div>').appendTo('body');
            const input = $('<input>', { type: 'text', placeholder: 'Enter your name' }).appendTo(container);
            const button = $('<button>').text('Add').appendTo(container);
            const list = $('<ul>').appendTo(container);

            button.click(() => {
                const name = input.val();
                if (name) {
                    list.append($('<li>').text(name));
                    input.val(''); // Clear input after adding
                }
            });
            return container;
        };
        const createCanvasAnimation = () => {
            const d = $('<div>');
            const canvas = $('<canvas>', { width: 400, height: 300 })
                .appendTo(d).get(0);
            const ctx = canvas.getContext('2d');
            let squares = [{x: 50, y: 50, dx: 2, dy: 2, size: 20}]; // Initial square

            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas
                squares.forEach(square => {
                    ctx.fillRect(square.x, square.y, square.size, square.size); // Draw square
                    // Update position
                    square.x += square.dx;
                    square.y += square.dy;
                    // Reflect off walls
                    if(square.x <= 0 || square.x + square.size >= canvas.width) square.dx *= -1;
                    if(square.y <= 0 || square.y + square.size >= canvas.height) square.dy *= -1;
                });
            };

            setInterval(draw, 30); // Redraw every 30ms

            // Add a new square every 2 seconds
            setInterval(() => {
                squares.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, dx: 2, dy: 2, size: Math.random() * 30 + 10 });
                if(squares.length > 10) squares.shift(); // Keep array manageable
            }, 2000);
            return d;
        };

        function lmUI() {
            const d = $('<div>');
            d.append('Loading');
            new LanguageModelClient('http://xyz:11434/api')
                .generateText('Why is the sky blue?  One short sentence.',
                    (x)=>d.append(JSON.stringify(x, null, 4)));
            return d;
        }

        const s = new SpaceGraph($('#cy'));
        s.addNode($('<div>Normal content</div>'));
        s.addNode($('<div>')
            .append($('<button>').text('Text Node').click(() => s.addNode($('<div>').text('Example Text Node'))))
            .append($('<button>').text('List').click(() => s.addNode(createInteractiveList())))
            .append($('<button>').text('Animation').click(() => s.addNode(createCanvasAnimation())))
            .append($('<button>').text('Iframe Node').click(() => s.addNode($('<iframe>').attr({
                src: 'https://wikipedia.org',
                style: 'width:300px; height:200px;'
            }))))
            .append($('<button>').text('Random Content Node').click(() => s.addNode($('<div>').html('<strong>Random Content:</strong> ' + Math.random()))))
            .append($('<button>').text('LM API').click(()=>s.addNode(lmUI())))
        );

        //s.addNode($('<iframe src="https://wikipedia.org" style="min-width: 100px; min-height: 100px; width:100%;height:100%"></iframe>'));
    });

</script>
</body>
</html>
